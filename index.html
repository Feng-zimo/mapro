<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>全能口算</title>

<style>
* { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont; }
body { margin:0; background:#f5f7fa; }

/* ===== 全屏练习 ===== */
#startScreen {
  position:fixed; inset:0;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:#fff; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
#startScreen h1 { font-size:42px; margin-bottom:30px; }
#startBtn {
  font-size:22px; padding:16px 48px;
  border:none; border-radius:40px;
  background:#fff; color:#4facfe;
  cursor:pointer; font-weight:600;
}

/* ===== 倒计时 ===== */
#countdown {
  position:fixed; inset:0;
  backdrop-filter: blur(20px);
  background:rgba(0,0,0,.35);
  color:#fff; font-size:90px;
  display:none; align-items:center; justify-content:center;
  z-index:20;
}

/* ===== 练习区 ===== */
.container {
  max-width:460px; margin:auto; padding:16px;
}
.stats {
  display:flex; justify-content:space-between;
  font-size:13px; margin-bottom:10px;
}
.progress { display:flex; gap:6px; justify-content:center; margin:10px 0; }
.dot { width:10px;height:10px;border-radius:50%;background:#e5e7eb; }
.dot.done { background:#22c55e; }

.question {
  text-align:center; font-size:40px; font-weight:700;
  margin:20px 0;
}
.answer {
  text-align:center; font-size:32px;
  color:#2563eb; min-height:40px;
}
.tip { text-align:center; min-height:24px; margin-top:8px; font-size:14px; }
.tip.ok { color:#16a34a; }
.tip.err { color:#dc2626; }

/* ===== 键盘 ===== */
.keyboard {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:10px; margin-top:14px;
}
.key {
  height:56px; font-size:22px;
  border:none; border-radius:12px;
  background:#f3f4f6; cursor:pointer;
}
.key:active { background:#d1d5db; }
.key.enter { background:#22c55e; color:#fff; }
.key.clear { background:#fee2e2; color:#dc2626; }

/* ===== 结果 ===== */
#resultCard {
  display:none; text-align:center;
  background:#fff; border-radius:16px;
  padding:24px; margin-top:20px;
}
#resultCard button {
  margin-top:16px; padding:12px 36px;
  border:none; border-radius:30px;
  background:#4facfe; color:#fff;
  font-size:16px; cursor:pointer;
}

/* ===== 历史 ===== */
#history {
  margin-top:20px; background:#fff;
  border-radius:16px; padding:14px;
}
.day { border-bottom:1px solid #eee; }
.dayHeader {
  cursor:pointer; font-weight:600;
  padding:10px 0; display:flex;
  justify-content:space-between;
}
.dayBody { display:none; padding-left:10px; }
.item { font-size:13px; margin:6px 0; }
.ok { color:#16a34a; }
.err { color:#dc2626; }

#bestTag {
  background:#fff; border-radius:16px;
  padding:14px; margin-bottom:14px;
  font-weight:600; color:#4facfe;
}
</style>
</head>

<body>

<!-- 开始 -->
<div id="startScreen">
  <h1>🧠 全能口算</h1>
  <button id="startBtn">开始练习</button>
</div>

<!-- 倒计时 -->
<div id="countdown">3</div>

<!-- 练习 -->
<div class="container" id="practice" style="display:none">
  <div class="stats">
    <span>进度：<b id="idx">0/20</b></span>
    <span>总耗时：<b id="total">0.00</b>s</span>
    <span>最快：<b id="best">--</b>s</span>
  </div>

  <div class="progress" id="bar"></div>

  <div class="question" id="q">准备开始</div>
  <div class="answer" id="ans"></div>
  <div class="tip" id="tip"></div>

  <div class="keyboard">
    <button class="key" data-k="7">7</button>
    <button class="key" data-k="8">8</button>
    <button class="key" data-k="9">9</button>
    <button class="key" data-k="4">4</button>
    <button class="key" data-k="5">5</button>
    <button class="key" data-k="6">6</button>
    <button class="key" data-k="1">1</button>
    <button class="key" data-k="2">2</button>
    <button class="key" data-k="3">3</button>
    <button class="key" data-k="0">0</button>
    <button class="key" data-k=".">.</button>
    <button class="key clear" id="clr">清除</button>
    <button class="key enter" id="ok">确定</button>
  </div>

  <div id="resultCard">
    <h2 id="rTitle"></h2>
    <p id="rText"></p>
    <button onclick="restart()">再来一次</button>
  </div>
</div>

<!-- 历史 -->
<div class="container" id="history" style="display:none">
  <div id="bestTag"></div>
  <div id="historyList"></div>
</div>

<script>
const COUNT = 20, KEY = "calcDB";
let state = {
  list:[], idx:0, start:0,
  total:0, best:Infinity, expr:""
};

/* ===== 题库 ===== */
function bank(){
  const b = [];

  for (let a=11;a<=19;a++)
    for (let b_=1;b_<=9;b_++)
      b.push({ q:`${a*b_}=?×?`, a:`${a}×${b_}` });

  for (let i=1;i<=29;i++) b.push({ q:`${i}²=?`, a:i*i });
  for (let i=1;i<=10;i++) b.push({ q:`${i}³=?`, a:i*i*i });

  for (let i=1;i<=10;i++) b.push({ q:`2^${i}=?`, a:2**i });

  [1,2,6,24,120,720,5040,40320,362880,3628800]
    .forEach((v,i)=>b.push({ q:`${i+1}! = ?`, a:v }));

  const f=[
    ["1/2","0.5"],["1/3","0.33"],["1/4","0.25"],
    ["1/6","0.17"],["1/8","0.125"],
    ["2/3","0.67"],["3/4","0.75"],
    ["3/8","0.375"],["5/6","0.83"],
    ["7/8","0.875"],["5/8","0.625"]
  ];
  f.forEach(([q,a])=>{
    for(let i=0;i<3;i++) b.push({ q:`${q}=?`, a });
  });

  return b;
}

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

/* ===== 练习流程 ===== */
function newRound(){
  state.list = shuffle(bank()).slice(0,COUNT);
  state.idx=0; state.total=0; state.best=Infinity; state.expr="";
  load();
}

function load(){
  renderBar();
  document.getElementById("idx").innerText=(state.idx+1)+"/"+COUNT;
  document.getElementById("ans").innerText="";
  document.getElementById("tip").innerText="";

  if(state.idx>=COUNT){
    finish();
    return;
  }
  state.start=Date.now();
  document.getElementById("q").innerText=state.list[state.idx].q;
}

function submit(){
  if(!state.expr) return;
  const cost=Date.now()-state.start;
  const ok=Math.abs(
    eval(state.expr)-eval(state.list[state.idx].a)
  )<0.01;

  state.total+=cost;
  if(cost<state.best) state.best=cost;

  document.getElementById("total").innerText=(state.total/1000).toFixed(2);
  document.getElementById("best").innerText=(state.best/1000).toFixed(2);

  const tip=document.getElementById("tip");
  tip.className=ok?"tip ok":"tip err";
  tip.innerText=ok?"✅ 正确":"❌ 错误 答案："+state.list[state.idx].a;

  save(ok,cost);
  state.idx++;
  state.expr="";
  setTimeout(load, ok?600:800);
}

/* ===== 结束 ===== */
function finish(){
  document.getElementById("q").innerText="🎉 练习完成";
  document.getElementById("resultCard").style.display="block";
  document.getElementById("rTitle").innerText="本次练习数据";
  document.getElementById("rText").innerText=
    `总用时 ${(state.total/1000).toFixed(1)}s | 最快 ${state.best/1000}s`;
  showHistory();
}

/* ===== 历史 ===== */
function save(ok,ms){
  const db=JSON.parse(localStorage.getItem(KEY)||"[]");
  db.push({
    q:state.list[state.idx-1].q,
    user:state.expr,
    ok,
    ms,
    date:new Date().toLocaleDateString()
  });
  localStorage.setItem(KEY,JSON.stringify(db.slice(-200)));
  setTimeout(showHistory,300);
}

function showHistory(){
  const db=JSON.parse(localStorage.getItem(KEY)||"[]");
  const days={};
  db.forEach(r=>{
    days[r.date]=days[r.date]||[];
    days[r.date].push(r);
  });

  let html="";
  let bestAvg=Infinity;

  Object.keys(days).reverse().forEach(date=>{
    const g=days[date];
    const avg=g.reduce((s,x)=>s+x.ms,0)/g.length;
    if(avg<bestAvg) bestAvg=avg;

    html+=`<div class="day">
      <div class="dayHeader" onclick="this.nextElementSibling.style.display=
        this.nextElementSibling.style.display==='block'?'none':'block'">
        <span>${date} 练习（${g.length}题）</span>
        <span>平均速度 ${avg.toFixed(0)}ms</span>
      </div>
      <div class="dayBody">`+
      g.map(h=>`<div class="item ${h.ok?'ok':'err'}">
        ${h.q} → ${h.user} (${h.ms/1000}s)
      </div>`).join("")+
      `</div></div>`;
  });

  document.getElementById("historyList").innerHTML=html;
  document.getElementById("bestTag").innerText=
    "🏅 历史最佳平均速度："+(bestAvg===Infinity?"--":(bestAvg/1000).toFixed(2)+"s");
}

/* ===== UI 控制 ===== */
document.getElementById("startBtn").onclick=()=>{
  document.getElementById("startScreen").style.display="none";
  document.getElementById("practice").style.display="block";
  document.getElementById("history").style.display="block";

  let n=3,box=document.getElementById("countdown");
  box.style.display="flex";
  box.innerText=n;
  const t=setInterval(()=>{
    n--;
    if(n===0){ clearInterval(t); box.style.display="none"; newRound(); }
    box.innerText=n;
  },1000);
};

function restart(){
  document.getElementById("resultCard").style.display="none";
  newRound();
}

document.querySelectorAll(".key[data-k]")
  .forEach(b=>b.onclick=e=>state.expr+=e.target.dataset.k);
document.getElementById("clr").onclick=()=>state.expr="";
document.getElementById("ok").onclick=submit;

renderBar();
function renderBar(){
  const bar=document.getElementById("bar"); bar.innerHTML="";
  for(let i=0;i<COUNT;i++){
    const d=document.createElement("div");
    d.className="dot"+(i<state.idx?" done":"");
    bar.appendChild(d);
  }
}

showHistory();
</script>
</body>
</html>
