<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>口算练习</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#f5f7fa;margin:0;padding:16px;
  display:flex;justify-content:center;
}
.container{
  width:100%;max-width:420px;background:#fff;
  border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);
  padding:16px;box-sizing:border-box;
}
.tabs{display:flex;margin-bottom:12px;border-bottom:1px solid #e5e7eb;}
.tab{padding:8px 16px;cursor:pointer;color:#6b7280;font-weight:500;}
.tab.active{color:#3b82f6;border-bottom:2px solid #3b82f6;}

.card{display:none;flex-direction:column;align-items:center;}
.card.active{display:flex;}

.stats{
  width:100%;display:flex;justify-content:space-around;
  margin-bottom:16px;font-size:14px;color:#4b5563;
}
.question{font-size:26px;font-weight:600;margin:24px 0;color:#111827;text-align:center;}
.answer-input{
  width:100%;padding:16px;border:1px solid #d1d5db;
  border-radius:8px;font-size:20px;text-align:center;
  margin-bottom:12px;box-sizing:border-box;
}
.feedback{font-size:16px;margin-bottom:16px;min-height:24px;}
.ok{color:#10b981;}
.err{color:#ef4444;}

.keypad{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;
}
.key{
  padding:16px;font-size:18px;border:none;
  border-radius:8px;background:#e5e7eb;cursor:pointer;
}
.key.clr{background:#fee2e2;color:#dc2626;}
.key.submit{background:#10b981;color:#fff;grid-column:span 3;}

.btn{
  padding:12px 24px;border:none;border-radius:8px;
  background:#3b82f6;color:#fff;font-size:16px;
  cursor:pointer;margin-top:16px;
}
.btn.secondary{background:#6b7280;}

.countdown{
  font-size:48px;font-weight:bold;color:#3b82f6;
  text-align:center;margin:20px 0;
}
</style>
</head>

<body>
<div class="container">

  <div class="tabs">
    <div class="tab active" onclick="switchTab('practice')">练习</div>
    <div class="tab" onclick="switchTab('history')">历史</div>
  </div>

  <!-- 练习 -->
  <div id="practice" class="card active">
    <div class="stats">
      <div>进度: <span id="progress">0/20</span></div>
      <div>总耗时: <span id="totalTime">0s</span></div>
      <div>最快: <span id="bestTime">--s</span></div>
    </div>

    <div id="countdown" class="countdown" style="display:none;"></div>

    <div id="question" class="question">点击开始</div>
    <div id="answerBox" class="answer-input" style="display:none;"></div>
    <div id="feedback" class="feedback"></div>

    <div id="keypad" class="keypad" style="display:none;">
      <button class="key" data-k="1">1</button>
      <button class="key" data-k="2">2</button>
      <button class="key" data-k="3">3</button>
      <button class="key" data-k="4">4</button>
      <button class="key" data-k="5">5</button>
      <button class="key" data-k="6">6</button>
      <button class="key" data-k="7">7</button>
      <button class="key" data-k="8">8</button>
      <button class="key" data-k="9">9</button>
      <button class="key clr" id="clr">C</button>
      <button class="key" data-k="0">0</button>
      <button class="key submit" id="submitBtn">提交</button>
    </div>

    <button class="btn" id="startBtn" onclick="startPracticeFlow()">开始练习</button>
  </div>

  <!-- 结果 -->
  <div id="result" class="card">
    <div class="title">练习完成！</div>
    <div id="resultStats"></div>
    <button class="btn" onclick="restart()">再来一组</button>
    <button class="btn secondary" onclick="switchTab('history')">查看历史</button>
  </div>

  <!-- 历史 -->
  <div id="historyPanel" class="card">
    <h3>历史记录</h3>
    <div id="historyList"></div>
  </div>

</div>

<script>
const COUNT = 20;
const REVERSE = 0.8;

const TYPES = [
  { name:'×', gen:()=>[r(10,99), r(2,9)] },
  { name:'+', gen:()=>[r(100,999), r(100,999)] },
  { name:'-', gen:()=>{let a=r(100,999),b=r(100,999);if(b>a)[a,b]=[b,a];return[a,b];} }
];

const r = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;

const state = {
  list:[], idx:0, total:0, best:Infinity, start:0
};

const $ = id => document.getElementById(id);

function startPracticeFlow(){
  $('startBtn').style.display='none';
  $('countdown').style.display='block';
  state.idx=0; state.total=0; state.best=Infinity;
  state.list=genQuestions();

  let n=3;
  $('countdown').innerText=n;
  const t=setInterval(()=>{
    n--;
    if(n===0){clearInterval(t);$('countdown').style.display='none';loadQ();}
    else $('countdown').innerText=n;
  },1000);
}

function genQuestions(){
  const list=[];
  for(let i=0;i<COUNT;i++){
    const t=TYPES[r(0,TYPES.length-1)];
    const [a,b]=t.gen();
    const ans = t.name==='×'?a*b:t.name==='+'?a+b:a-b;

    if(Math.random()<REVERSE){
      if(Math.random()<0.5)
        list.push({q:`? ${t.name} ${b} = ${ans}`, a:a});
      else
        list.push({q:`${a} ${t.name} ? = ${ans}`, a:b});
    } else {
      list.push({q:`${a} ${t.name} ${b} = ?`, a:ans});
    }
  }
  return list;
}

function loadQ(){
  if(state.idx>=COUNT){finish();return;}
  $('question').innerText=state.list[state.idx].q;
  $('answerBox').innerText='';
  $('answerBox').style.display='block';
  $('keypad').style.display='grid';
  state.start=Date.now();
}

function submit(){
  const v=$('answerBox').innerText;
  if(!v)return;
  const cost=Date.now()-state.start;
  const q=state.list[state.idx];
  const ok=Number(v)===q.a;

  state.total+=cost;
  if(cost<state.best)state.best=cost;

  $('totalTime').innerText=(state.total/1000).toFixed(1)+'s';
  $('bestTime').innerText=(state.best/1000).toFixed(1)+'s';
  $('progress').innerText=(state.idx+1)+'/'+COUNT;
  $('feedback').className='feedback '+(ok?'ok':'err');
  $('feedback').innerText=ok?'✅ 正确':'❌ 正确答案：'+q.a;

  state.idx++;
  setTimeout(loadQ,1000);
}

function finish(){
  $('practice').classList.remove('active');
  $('result').classList.add('active');
  $('resultStats').innerHTML=`
    总耗时：${(state.total/1000).toFixed(1)}s<br>
    最快一题：${(state.best/1000).toFixed(1)}s
  `;
}

/* 事件 */
keypad.onclick=e=>{
  if(e.target.dataset.k)$('answerBox').innerText+=e.target.dataset.k;
  if(e.target.id==='clr')$('answerBox').innerText=$('answerBox').innerText.slice(0,-1);
  if(e.target.id==='submitBtn')submit();
};

document.onkeydown=e=>{
  if(e.key>='0'&&e.key<='9')$('answerBox').innerText+=e.key;
  if(e.key==='Backspace')$('answerBox').innerText=$('answerBox').innerText.slice(0,-1);
  if(e.key==='Enter')submit();
};

function restart(){
  $('result').classList.remove('active');
  $('practice').classList.add('active');
  $('startBtn').style.display='inline-block';
  $('question').innerText='点击开始';
}

function switchTab(t){
  ['practice','result','historyPanel'].forEach(id=>$(id).classList.remove('active'));
  $(t==='history'?'historyPanel':'practice').classList.add('active');
}
</script>
</body>
</html>
