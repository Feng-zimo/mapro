<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>口算练习</title>
<style>
body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding-top: 50px; }
#app { background: white; width: 320px; margin: auto; padding: 20px; border-radius: 16px; box-shadow: 0 4px 12px rgba(0,0,0,.1); }
button { background: #4facfe; color: white; border: none; padding: 12px 24px; border-radius: 20px; font-size: 18px; cursor: pointer; }
#quiz { font-size: 36px; margin: 20px 0; }
#result { margin-top: 10px; font-size: 14px; color: #666; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ddd; padding: 6px; font-size: 12px; }
</style>
</head>
<body>

<div id="app">
  <h2>全能口算</h2>
  <div id="quiz">点击开始</div>
  <button onclick="start()">开始练习</button>
  <div id="result"></div>

  <div id="tableArea" style="display:none;">
    <h4>11~19 乘法表</h4>
    <div id="tableBox"></div>
  </div>
</div>

<script>
let count = 0;
let timer = null;

function start() {
  count = 3;
  document.getElementById("quiz").innerText = count;
  document.getElementById("result").innerText = "";
  
  timer = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(timer);
      showQuiz();
    } else {
      document.getElementById("quiz").innerText = count;
    }
  }, 1000);
}

function showQuiz() {
  const a = Math.floor(Math.random() * 9) + 11;
  const b = Math.floor(Math.random() * 9) + 1;
  document.getElementById("quiz").innerText = a + " × " + b + " = ?";
  document.getElementById("result").innerText = "答案是：" + (a * b);
  
  // 显示答案表
  showTable();
}

function showTable() {
  let html = "<table><tr><th>×</th>";
  for (let i = 1; i <= 9; i++) html += "<th>" + i + "</th>";
  html += "</tr>";
  for (let i = 11; i <= 19; i++) {
    html += "<tr><th>" + i + "</th>";
    for (let j = 1; j <= 9; j++) {
      html += "<td>" + (i * j) + "</td>";
    }
    html += "</tr>";
  }
  html += "</table>";
  document.getElementById("tableArea").style.display = "block";
  document.getElementById("tableBox").innerHTML = html;
}
</script>

</body>
</html>
