<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>全能口算练习</title>

<style>
* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI";
}
body {
  background: #f5f5f5;
  padding: 16px;
  max-width: 480px;
  margin: auto;
}
.container {
  background: #fff;
  border-radius: 14px;
  padding: 18px;
  box-shadow: 0 4px 14px rgba(0,0,0,.08);
}
h1 {
  text-align: center;
  margin-bottom: 14px;
}
.tabs {
  display: flex;
  border-bottom: 1px solid #ddd;
  margin-bottom: 14px;
}
.tab {
  flex: 1;
  padding: 10px;
  border: none;
  background: none;
  font-size: 16px;
  cursor: pointer;
}
.tab.active {
  border-bottom: 3px solid #3498db;
  color: #3498db;
  font-weight: bold;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

.stats {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 10px;
}
.progress {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin: 10px 0;
}
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #e5e7eb;
}
.dot.done { background: #22c55e; }

.question {
  text-align: center;
  font-size: 36px;
  font-weight: bold;
  margin: 18px 0;
}
.answer {
  text-align: center;
  font-size: 28px;
  min-height: 38px;
  color: #2563eb;
}
.tip {
  text-align: center;
  min-height: 24px;
  font-size: 14px;
}
.tip.ok { color: #16a34a; }
.tip.err { color: #dc2626; }

.keyboard {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-top: 14px;
}
.key {
  height: 54px;
  font-size: 22px;
  border-radius: 12px;
  border: none;
  background: #f3f4f6;
  cursor: pointer;
}
.key:active { background: #d1d5db; }
.key.enter { background: #22c55e; color: #fff; }
.key.clear { background: #fee2e2; color: #dc2626; }

.history {
  margin-top: 14px;
  font-size: 13px;
  max-height: 220px;
  overflow-y: auto;
}
.item { margin-bottom: 6px; }
.ok { color: #16a34a; }
.err { color: #dc2626; }
</style>
</head>

<body>
<div class="container">

<h1>全能口算</h1>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" data-tab="practice">练习</button>
  <button class="tab" data-tab="history">历史记录</button>
</div>

<!-- 练习 -->
<div id="practice" class="tab-content active">
  <div class="stats">
    <span>进度：<b id="idx">0/20</b></span>
    <span>总耗时：<b id="total">0.00</b>s</span>
    <span>最快：<b id="best">--</b>s</span>
  </div>

  <div class="progress" id="bar"></div>

  <div class="question" id="q">点击「开始练习」</div>
  <div class="answer" id="ans"></div>
  <div class="tip" id="tip"></div>

  <div class="keyboard">
    <button class="key" data-k="7">7</button>
    <button class="key" data-k="8">8</button>
    <button class="key" data-k="9">9</button>
    <button class="key" data-k="4">4</button>
    <button class="key" data-k="5">5</button>
    <button class="key" data-k="6">6</button>
    <button class="key" data-k="1">1</button>
    <button class="key" data-k="2">2</button>
    <button class="key" data-k="3">3</button>
    <button class="key" data-k="0">0</button>
    <button class="key" data-k="*">×</button>
    <button class="key" data-k=".">.</button>
    <button class="key clear" id="clr">清除</button>
    <button class="key enter" id="ok">确定</button>
  </div>

  <button id="startBtn" style="width:100%;margin-top:14px;">开始练习</button>
</div>

<!-- 历史 -->
<div id="history" class="tab-content">
  <div class="history" id="his"></div>
  <button id="clearHis" style="width:100%;margin-top:10px;">清除历史</button>
</div>

</div>

<script>
const COUNT = 20, KEY = "calcDB";
let state = {
  list:[], idx:0, start:0, total:0, best:Infinity, expr:""
};

function bank() {
  const b = [];
  for (let a=11;a<=19;a++) for (let b_=1;b_<=9;b_++)
    b.push({ q:`${a*b_} = ? × ?`, a:`${a}×${b_}` });

  [221,247,323,10,100,500,2500,1000].forEach(v=>{
    b.push({ q:`${v} = ? × ?`, a:"?" });
  });

  for (let i=1;i<=29;i++) b.push({ q:`${i}² = ?`, a:String(i*i) });
  for (let i=1;i<=10;i++) b.push({ q:`${i}³ = ?`, a:String(i*i*i) });

  [[1/2,0.5],[1/3,0.33],[1/4,0.25],[1/8,0.125]].forEach(([q,a])=>
    b.push({ q:`${q} = ?`, a:String(a) })
  );

  for (let i=1;i<=10;i++) b.push({ q:`2^${i} = ?`, a:String(2**i) });
  [1,2,6,24,120,720,5040,40320,362880,3628800]
    .forEach((v,i)=>b.push({ q:`${i+1}! = ?`, a:String(v) }));

  return b;
}

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

function newRound(){
  state.list = shuffle(bank()).slice(0,COUNT);
  state.idx=0; state.total=0; state.best=Infinity; state.expr="";
  load();
}

function load(){
  renderBar();
  document.getElementById("idx").innerText = (state.idx+1)+"/"+COUNT;
  document.getElementById("ans").innerText = "";
  document.getElementById("tip").innerText = "";

  if(state.idx>=COUNT){
    document.getElementById("q").innerText="🎉 完成！";
    return;
  }
  state.start = Date.now();
  document.getElementById("q").innerText = state.list[state.idx].q;
}

function input(k){
  if(k==="*") k="×";
  state.expr+=k;
  document.getElementById("ans").innerText = state.expr;
}
function clearAns(){ state.expr=""; document.getElementById("ans").innerText=""; }

function submit(){
  if(!state.expr) return;
  const cost = Date.now()-state.start;
  const ok = Math.abs(
    eval(state.expr.replace(/×/g,"*")) -
    eval(state.list[state.idx].a.replace(/×/g,"*"))
  ) < 0.01;

  state.total += cost;
  if(cost < state.best) state.best = cost;

  document.getElementById("total").innerText = (state.total/1000).toFixed(2);
  document.getElementById("best").innerText = (state.best/1000).toFixed(2);

  const tip = document.getElementById("tip");
  tip.className = ok ? "tip ok" : "tip err";
  tip.innerText = ok ? "正确 ✅" : "错误 ❌ 答案：" + state.list[state.idx].a;

  save(ok,cost);
  state.idx++; state.expr="";
  setTimeout(load, 900);
}

function renderBar(){
  const bar=document.getElementById("bar"); bar.innerHTML="";
  for(let i=0;i<COUNT;i++){
    const d=document.createElement("div");
    d.className="dot"+(i<state.idx?" done":"");
    bar.appendChild(d);
  }
}

function save(ok,ms){
  const db=JSON.parse(localStorage.getItem(KEY)||"[]");
  db.push({ q:state.list[state.idx-1].q, user:state.expr, ok, ms });
  localStorage.setItem(KEY,JSON.stringify(db.slice(-50)));
  showHis();
}

function showHis(){
  const db=JSON.parse(localStorage.getItem(KEY)||"[]");
  document.getElementById("his").innerHTML =
    db.reverse().map(h=>`<div class="item ${h.ok?'ok':'err'}">
      ${h.q} → ${h.user} (${h.ms/1000}s)</div>`).join("");
}

document.querySelectorAll(".key[data-k]").forEach(b=>b.onclick=e=>input(e.target.dataset.k));
document.getElementById("clr").onclick=clearAns;
document.getElementById("ok").onclick=submit;
document.getElementById("startBtn").onclick=newRound;
document.getElementById("clearHis").onclick=()=>{
  localStorage.removeItem(KEY); showHis();
};
showHis();

/* Tab 切换 */
document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
    document.getElementById(tab.dataset.tab).classList.add("active");
  };
});
</script>
</body>
</html>
