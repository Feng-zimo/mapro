<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>全能口算</title>
<style>
* { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont; }
body { margin:0; background:#f5f7fa; color:#1f2937; }

.tabs { display:flex; background:#1e293b; color:#fff; }
.tab { flex:1; text-align:center; padding:14px 0; cursor:pointer; font-size:16px; }
.tab.active { border-bottom:3px solid #38bdf8; color:#38bdf8; }

.container { max-width:460px; margin:auto; padding:16px; }

#startScreen { position:fixed; inset:0; background:linear-gradient(135deg,#4facfe,#00f2fe); color:#fff; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; }
#startScreen h1 { font-size:42px; margin-bottom:30px; }
#startBtn { font-size:22px; padding:16px 48px; border:none; border-radius:40px; background:#fff; color:#4facfe; cursor:pointer; font-weight:600; }

#countdown { position:fixed; inset:0; backdrop-filter: blur(20px); background:rgba(0,0,0,.35); color:#fff; font-size:90px; display:none; align-items:center; justify-content:center; z-index:20; }

.stats { display:flex; justify-content:space-between; font-size:13px; margin-bottom:10px; }
.progress { display:flex; gap:6px; justify-content:center; margin:10px 0; }
.dot { width:10px;height:10px;border-radius:50%;background:#e5e7eb; }
.dot.done { background:#22c55e; }
.question { text-align:center; font-size:40px; font-weight:700; margin:20px 0; }
.answer { text-align:center; font-size:32px; color:#2563eb; min-height:40px; }

#pcInput { width:100%; height:50px; font-size:24px; text-align:center; border-radius:12px; border:2px solid #e5e7eb; outline:none; display:none; margin-bottom:15px; }

.tip { text-align:center; min-height:24px; margin-top:8px; font-size:14px; }
.tip.ok { color:#16a34a; }
.tip.err { color:#dc2626; }

.keyboard { display:none; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
.key { height:56px; font-size:22px; border:none; border-radius:12px; background:#f3f4f6; cursor:pointer; }
.key:active { background:#d1d5db; }
.key.enter { background:#22c55e; color:#fff; }
.key.clear { background:#fee2e2; color:#dc2626; }

#resultCard { display:none; text-align:center; background:#fff; border-radius:16px; padding:24px; margin-top:20px; }
#resultCard button { margin:8px; padding:12px 24px; border:none; border-radius:30px; background:#4facfe; color:#fff; font-size:16px; cursor:pointer; }

/* 答案卡片（原有） */
#answerCard { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50; align-items:center; justify-content:center; padding:20px; }
#answerBox { background:#fff; border-radius:16px; padding:20px; max-height:80vh; overflow-y:auto; width:100%; max-width:420px; }
#answerBox h3 { text-align:center; margin-bottom:12px; }
.answerRow { font-size:14px; padding:6px 0; border-bottom:1px dashed #eee; }
.answerRow span { float:right; color:#2563eb; }

/* ✅ 答案表卡片（新增） */
#tableCard { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50; align-items:center; justify-content:center; padding:20px; }
#tableBox { background:#fff; border-radius:16px; padding:20px; max-height:85vh; overflow:auto; width:100%; max-width:440px; }
#tableBox h3 { text-align:center; margin-bottom:12px; }
table { width:100%; border-collapse: collapse; font-size:13px; }
th, td { border:1px solid #e5e7eb; padding:6px 8px; text-align:center; }
th { background:#f8fafc; font-weight:600; }
tr:nth-child(even) { background:#f9fafb; }

#historyPanel { display:none; background:#fff; padding:16px; border-radius:16px; margin-top:16px; }
.day { margin-bottom:16px; border:1px solid #e5e7eb; border-radius:12px; overflow:hidden; }
.dayHeader { background:#f9fafb; padding:12px 16px; cursor:pointer; display:flex; justify-content:space-between; font-weight:600; }
.dayBody { display:none; padding:12px; }
.item { font-size:14px; padding:6px 0; border-bottom:1px dashed #e5e7eb; }
.item.ok { color:#16a34a; }
.item.err { color:#dc2626; }
#bestTag { text-align:center; font-weight:600; color:#4facfe; margin-bottom:12px; }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="switchTab('practice')">练习</div>
  <div class="tab" onclick="switchTab('history')">历史记录</div>
</div>

<div id="startScreen"><h1>🧠 全能口算</h1><button id="startBtn">开始练习</button></div>
<div id="countdown">3</div>

<div id="practice" class="container" style="display:none;">
  <div class="stats"><span>进度: <b id="idx">0</b>/<b id="total">0</b></span><span>总耗时: <b id="time">0</b>s</span><span>最快: <b id="best">--</b>s</span></div>
  <div class="progress" id="bar"></div>
  <div class="question" id="q">准备开始</div>
  <input type="text" id="pcInput">
  <div class="answer" id="a"></div>
  <div class="tip" id="tip"></div>
  <div class="keyboard" id="mobileKeyboard">
    <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button>
    <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button>
    <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
    <button class="key" data-k="0">0</button><button class="key" data-k=".">.</button>
    <button class="key clear" id="clr">清除</button>
    <button class="key enter" id="ok">确定</button>
  </div>
</div>

<div id="resultCard" class="container">
  <h2 id="resultTitle"></h2>
  <p id="resultText"></p>
  <button onclick="restart()">再来一次</button>
  <button onclick="showAnswers()">查看全部答案</button>
  <button onclick="showTable()">查看答案表</button>
</div>

<!-- 答案卡片 -->
<div id="answerCard" onclick="this.style.display='none'">
  <div id="answerBox" onclick="event.stopPropagation()">
    <h3>本次练习答案</h3>
    <div id="answerList"></div>
  </div>
</div>

<!-- ✅ 答案表卡片（新增） -->
<div id="tableCard" onclick="this.style.display='none'">
  <div id="tableBox" onclick="event.stopPropagation()">
    <h3>11~19 乘法答案表</h3>
    <div id="tableContent"></div>
  </div>
</div>

<div id="historyPanel" class="container">
  <div id="bestTag">🏅 历史最佳平均速度：--</div>
  <div id="historyList"></div>
</div>

<script>
const COUNT = 20;
const STORAGE_KEY = "OMP_HISTORY_V7";
let state = { list:[], idx:0, start:0, totalMs:0, bestMs:Infinity, currentExpr:'', lastAnswers:[] };
let isCounting = false;

/* ===== 题库 ===== */
function generateBank() {
  const b = [];
  [1,2,6,24,120,720,5040,40320,362880,3628800].forEach((v,i)=>b.push({q:`${i+1}! = ?`, a:v}));
  for(let i=1;i<=30;i++) b.push({q:`${i}² = ?`, a:i*i});
  [["1/2","0.5"],["1/4","0.25"],["3/4","0.75"],["1/8","0.125"],["3/8","0.375"]].forEach(f=>{for(let i=0;i<3;i++) b.push({q:f[0]+'=?', a:parseFloat(f[1])});});
  for(let a=11;a<=19;a++){for(let b=1;b<=9;b++){if(Math.random()>0.5){b.push({q:`${a*b} = ${a} × ?`, a:b});}else{b.push({q:`${a*b} = ? × ${b}`, a:a});}}}
  [[221,17,13],[247,19,13],[323,19,17],[10,5,2],[100,25,4],[500,125,4],[2500,625,4],[1000,125,8]].forEach(([p,x,y])=>{if(Math.random()>0.5){b.push({q:`${p} = ${x} × ?`, a:y});}else{b.push({q:`${p} = ? × ${y}`, a:x});}});
  return b;
}

function isMobile(){ return window.innerWidth<=768; }
function adjustUI(){ isMobile()?(pcInput.style.display='none', mobileKeyboard.style.display='grid'):(pcInput.style.display='block', mobileKeyboard.style.display='none', pcInput.focus()); }

function startPracticeFlow(){
  if(isCounting) return; isCounting=true;
  startScreen.style.display='none'; practice.style.display='block';
  resultCard.style.display='none'; historyPanel.style.display='block';
  adjustUI();
  let c=3, cd=countdown; cd.style.display='flex'; cd.innerText=c;
  const t=setInterval(()=>{c--;if(c===0){clearInterval(t);cd.style.display='none';isCounting=false;startNewRound();}cd.innerText=c;},1000);
}

function startNewRound(){
  state.list=generateBank().sort(()=>0.5-Math.random()).slice(0,COUNT);
  state.idx=0; state.totalMs=0; state.bestMs=Infinity; state.lastAnswers=[];
  loadQuestion();
}

function loadQuestion(){
  if(state.idx>=COUNT){ finishPractice(); return; }
  idx.innerText=state.idx+1; total.innerText=COUNT;
  q.innerText=state.list[state.idx].q; a.innerText=''; tip.innerText=''; pcInput.value='';
  state.start=Date.now(); renderProgress();
  if(!isMobile()) pcInput.focus();
}

function checkAnswer(ans){
  if(!ans) return;
  const cost=Date.now()-state.start;
  const correct=state.list[state.idx].a;
  const user=eval(ans.replace('×','*'));
  const ok=Math.abs(user-correct)<0.01;
  state.totalMs+=cost;
  if(cost<state.bestMs) state.bestMs=cost;
  time.innerText=(state.totalMs/1000).toFixed(1);
  best.innerText=(state.bestMs/1000).toFixed(1);
  tip.className=ok?'tip ok':'tip err';
  tip.innerText=ok?'✅ 正确':`❌ 错误 答案：${correct}`;
  state.lastAnswers.push({q:state.list[state.idx].q, a:correct});
  saveHistory(ok,cost);
  state.idx++;
  setTimeout(loadQuestion, ok?600:1000);
}

function finishPractice(){
  practice.style.display='none';
  resultCard.style.display='block';
  resultTitle.innerText='🎉 练习完成';
  resultText.innerText=`总用时 ${(state.totalMs/1000).toFixed(1)}s | 最快 ${(state.bestMs/1000).toFixed(1)}s`;
  showHistory();
}

/* ===== 答案卡片 ===== */
function showAnswers(){
  let html='';
  state.lastAnswers.forEach((x,i)=>{html+=`<div class="answerRow">${i+1}. ${x.q} <span>${x.a}</span></div>`;});
  answerList.innerHTML=html;
  answerCard.style.display='flex';
}

/* ✅ 答案表（新增） ===== */
function showTable(){
  let html='<table><tr><th>×</th>';
  for(let j=1;j<=9;j++) html+=`<th>${j}</th>`;
  html+='</tr>';
  for(let i=11;i<=19;i++){
    html+=`<tr><th>${i}</th>`;
    for(let j=1;j<=9;j++) html+=`<td>${i*j}</td>`;
    html+='</tr>';
  }
  html+='</table>';
  tableContent.innerHTML=html;
  tableCard.style.display='flex';
}

/* ===== 历史 ===== */
function saveHistory(ok,ms){
  const db=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  db.push({q:state.list[state.idx-1].q, user:state.currentExpr, ok, ms, date:new Date().toLocaleDateString('zh-CN')});
  localStorage.setItem(STORAGE_KEY,JSON.stringify(db.slice(-200)));
  setTimeout(showHistory,300);
}

function showHistory(){
  const db=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  const g={}; db.forEach(r=>(g[r.date]=g[r.date]||[]).push(r));
  let best=Infinity,html='';
  Object.keys(g).reverse().forEach(d=>{
    const avg=g[d].reduce((s,r)=>s+r.ms,0)/g[d].length;
    if(avg<best) best=avg;
    html+=`<div class="day"><div class="dayHeader" onclick="toggleDay(this)"><span>${d}（${g[d].length}题）</span><span>平均 ${(avg/1000).toFixed(1)}s</span></div><div class="dayBody">`+
      g[d].reverse().map(r=>`<div class="item ${r.ok?'ok':'err'}">${r.q} → ${r.user}（${r.ms/1000}s）</div>`).join('')+
      `</div></div>`;
  });
  historyList.innerHTML=html;
  bestTag.innerText=`🏅 历史最佳平均速度：${best===Infinity?'--':(best/1000).toFixed(2)+'s'}`;
}

function toggleDay(h){ const b=h.nextElementSibling; b.style.display=b.style.display==='block'?'none':'block'; }
function restart(){ resultCard.style.display='none'; startPracticeFlow(); }

document.getElementById('startBtn').onclick=startPracticeFlow;
document.querySelectorAll('.key[data-k]').forEach(k=>k.onclick=e=>{state.currentExpr+=e.target.dataset.k;a.innerText=state.currentExpr;});
clr.onclick=()=>{state.currentExpr='';a.innerText='';pcInput.value='';};
ok.onclick=()=>checkAnswer(state.currentExpr);
pcInput.onkeydown=e=>{if(e.key==='Enter'){state.currentExpr=pcInput.value;checkAnswer(state.currentExpr);pcInput.value='';}};

function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${t}"]`).classList.add('active');
  practice.style.display=t==='practice'?'block':'none';
  historyPanel.style.display=t==='history'?'block':'none';
  if(t==='history') showHistory();
}

showHistory();
</script>
</body>
</html>
