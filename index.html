<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>乘积口算练习</title>
<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f6f7f9;
  padding: 16px;
  max-width: 460px;
  margin: auto;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.title {
  text-align: center;
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 14px;
}
.stat {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 10px;
}
.question {
  text-align: center;
  font-size: 38px;
  font-weight: bold;
  margin: 18px 0;
}
.answer {
  text-align: center;
  font-size: 30px;
  min-height: 40px;
  color: #2563eb;
}
.tip {
  text-align: center;
  min-height: 24px;
  margin-top: 8px;
  font-size: 14px;
}
.tip.ok { color: #16a34a; }
.tip.err { color: #dc2626; }
.keyboard {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-top: 14px;
}
.key {
  height: 56px;
  font-size: 22px;
  border-radius: 12px;
  border: none;
  background: #f3f4f6;
  cursor: pointer;
}
.key:active { background: #d1d5db; }
.key.enter { background: #22c55e; color: #fff; }
.key.clear { background: #fee2e2; color: #dc2626; }
.progress {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin: 12px 0;
}
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #e5e7eb;
}
.dot.done { background: #22c55e; }
.history {
  margin-top: 16px;
  font-size: 13px;
  max-height: 200px;
  overflow-y: auto;
}
.item { margin-bottom: 6px; }
.ok { color: #16a34a; }
.err { color: #dc2626; }
</style>
</head>
<body>

<div class="card">
  <div class="title">乘积口算</div>

  <div class="stat">
    <span>进度：<b id="idx">0/20</b></span>
    <span>总耗时：<b id="total">0.00</b>s</span>
    <span>最快：<b id="best">--</b>s</span>
  </div>

  <div class="progress" id="bar"></div>

  <div class="question" id="q">点击开始</div>
  <div class="answer" id="ans"></div>
  <div class="tip" id="tip"></div>

  <div class="keyboard">
    <button class="key" data-k="7">7</button>
    <button class="key" data-k="8">8</button>
    <button class="key" data-k="9">9</button>
    <button class="key" data-k="4">4</button>
    <button class="key" data-k="5">5</button>
    <button class="key" data-k="6">6</button>
    <button class="key" data-k="1">1</button>
    <button class="key" data-k="2">2</button>
    <button class="key" data-k="3">3</button>
    <button class="key" data-k="0">0</button>
    <button class="key" data-k="*">×</button>
    <button class="key clear" id="clr">清除</button>
    <button class="key enter" id="ok">确定</button>
  </div>
</div>

<div class="card history" id="his"></div>

<script>
const COUNT = 20, KEY = "prodQuiz";
let state = {
  list: [], idx: 0,
  start: 0, total: 0, best: Infinity,
  expr: ""
};

function bank() {
  const b = [];
  for (let a = 11; a <= 19; a++)
    for (let b_ = 1; b_ <= 9; b_++)
      b.push({ q: `${a*b_} = ? × ?`, a: `${a}×${b_}` });

  b.push({ q: "221 = ? × ?", a: "17×13" });
  b.push({ q: "247 = ? × ?", a: "19×13" });
  b.push({ q: "323 = ? × ?", a: "19×17" });

  b.push({ q: "10 = ? × ?", a: "5×2" });
  b.push({ q: "100 = ? × ?", a: "25×4" });
  b.push({ q: "500 = ? × ?", a: "125×4" });
  b.push({ q: "2500 = ? × ?", a: "625×4" });
  b.push({ q: "1000 = ? × ?", a: "125×8" });
  return b;
}

function shuffle(a) {
  return a.sort(() => Math.random() - 0.5);
}

function newRound() {
  state.list = shuffle(bank()).slice(0, COUNT);
  state.idx = 0;
  state.total = 0;
  state.best = Infinity;
  state.expr = "";
  load();
}

function load() {
  renderBar();
  document.getElementById("idx").innerText = (state.idx+1)+"/"+COUNT;
  document.getElementById("ans").innerText = "";
  document.getElementById("tip").innerText = "";
  if (state.idx >= COUNT) {
    document.getElementById("q").innerText = "完成！";
    return;
  }
  state.start = Date.now();
  document.getElementById("q").innerText = state.list[state.idx].q;
}

function input(k) {
  if (k === "*") k = "×";
  state.expr += k;
  document.getElementById("ans").innerText = state.expr;
}

function clearAns() {
  state.expr = "";
  document.getElementById("ans").innerText = "";
}

function submit() {
  if (!state.expr) return;
  const cost = Date.now() - state.start;
  const correct = state.list[state.idx].a;
  const ok = state.expr.replace(/\s/g,"") === correct.replace(/\s/g,"");

  state.total += cost;
  if (cost < state.best) state.best = cost;

  document.getElementById("total").innerText = (state.total/1000).toFixed(2);
  document.getElementById("best").innerText = (state.best/1000).toFixed(2);

  const tip = document.getElementById("tip");
  tip.className = ok ? "tip ok" : "tip err";
  tip.innerText = ok ? "正确 ✅" : "错误 ❌ 答案：" + correct;

  save(correct, ok, cost);
  state.idx++;
  state.expr = "";
  setTimeout(load, 900);
}

function renderBar() {
  const bar = document.getElementById("bar");
  bar.innerHTML = "";
  for (let i=0;i<COUNT;i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i<state.idx?" done":"");
    bar.appendChild(d);
  }
}

function save(q, ok, ms) {
  const db = JSON.parse(localStorage.getItem(KEY)||"[]");
  db.push({ q, user: state.expr, ok, ms });
  localStorage.setItem(KEY, JSON.stringify(db.slice(-50)));
  showHis();
}

function showHis() {
  const db = JSON.parse(localStorage.getItem(KEY)||"[]");
  document.getElementById("his").innerHTML =
    "<b>历史记录</b><br>" +
    db.reverse().map(h=>`<div class="item ${h.ok?'ok':'err'}">
      ${h.q} → ${h.user} (${h.ms/1000}s)</div>`).join("");
}

document.querySelectorAll(".key[data-k]")
  .forEach(b=>b.onclick=e=>input(e.target.dataset.k));
document.getElementById("clr").onclick = clearAns;
document.getElementById("ok").onclick = submit;

document.addEventListener("keydown", e=>{
  if (e.key>=0&&e.key<=9) input(e.key);
  if (e.key==="*") input("*");
  if (e.key==="Enter") submit();
  if (e.key==="Backspace") clearAns();
});

newRound();
showHis();
</script>
</body>
</html>
